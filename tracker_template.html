<header>

<script>
const NL = String.fromCharCode(10);
const BOM = String.fromCharCode(65279);
const DATA = __DATA__;
const LS = 'fcLeadNotes';
let notes = {};
try { notes = JSON.parse(localStorage.getItem(LS) || '{}'); } catch(e) {}
let tier = 'A', q = '', sortK = '_profit', sortD = -1;
let fy1 = '', fy2 = '', ad1 = '', ad2 = '';
let weekOnly = false, hideDead = false, tdOnly = false;
let sender = {name:'', llc:'', phone:''};
try { sender = Object.assign(sender, JSON.parse(localStorage.getItem('fcSender')||'{}')); } catch(e) {}
// deal-model controls (persisted)
let deal = {costpct: 10, buypct: 80, quiettitle: 3000, bidover: 20};
try { deal = Object.assign(deal, JSON.parse(localStorage.getItem('fcDeal')||'{}')); } catch(e) {}
const fmt = n => n ? '$' + Math.round(n).toLocaleString() : '';
const fmt0 = n => (n<0?'-$':'$') + Math.abs(Math.round(n)).toLocaleString();
const fmtK = n => { n=+n||0; const s=n<0?'-':''; n=Math.abs(n); const k=Math.round(n/1e3);
  return (n>=1e6 || k>=1000) ? s+'$'+(n/1e6).toFixed(2)+'M' : n>=1e3 ? s+'$'+k+'k' : s+'$'+Math.round(n); };
function recompute(){
  const bpRaw = (deal.buypct===''||deal.buypct==null||isNaN(+deal.buypct)) ? 80 : +deal.buypct;
  const buyPct = Math.max(0, bpRaw) / 100;                       // honor an explicit 0
  const costPct = Math.max(0, +deal.costpct || 0) / 100;
  const quietTitle = Math.max(0, +deal.quiettitle || 3000);     // tax-deed only
  const bidOver = Math.max(0, +deal.bidover || 0) / 100;        // tax-deed only
  DATA.forEach(r => {
    const judg = r.judg||0, val = r.value||0;
    // No market value (un-enriched / login-gated parcel): can't compute a real deal. Blank it.
    if(!val){ r._equity=null; r._purchase=null; r._cash=0; r._profit=null; r._roi=null; r._tight=false; r._nodata=true; return; }
    r._nodata = false;
    if(r.st === 'TD'){
      // TAX DEED: you win at auction (opening bid + a markup), then must clear title (quiet title)
      // before you can resell. Profit = resale value - winning bid - quiet title - resale costs.
      const obid = r.obid || judg || 0;
      const winbid = obid * (1 + bidOver);
      const costs = val * costPct;
      r._equity = val - obid;
      r._purchase = winbid;
      r._cash = winbid + quietTitle + costs;
      r._profit = val - r._cash;
      r._roi = r._cash > 0 ? (r._profit / r._cash * 100) : 0;
      r._tight = (winbid + quietTitle >= val);   // bid+title eats the value -> no margin
      return;
    }
    // FORECLOSURE: you profit by buying BELOW market, then reselling. Your purchase is your discounted
    // offer, but it can never be less than the debt you must pay off to take clean title.
    const offer = val * buyPct;
    const purchase = Math.max(offer, judg);
    const costs = val * costPct;
    r._equity = val - judg;            // total equity in the property (the opportunity size)
    r._purchase = purchase;
    r._cash = purchase + costs;        // all-in money to acquire + carry + resell
    r._profit = val - r._cash;         // realistic profit = resale - what you paid - costs
    r._roi = r._cash > 0 ? (r._profit / r._cash * 100) : 0;
    r._tight = (judg > offer);         // debt eats your discount -> thin/negative, flag it
  });
}
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function titleCase(s){ return String(s||'').toLowerCase().replace(/\b([a-z])/g, m=>m.toUpperCase()); }
const copyBtn = (text, label) => '<button class="cpy" type="button" data-copy="'+esc(text)+'" title="Copy '+(label||'')+'">&#128203;</button>';
function genLetter(r){

  const first = owner.split(' ')[0] || owner;
  const addr = esc(r.addr), mail = esc(r.mail||r.addr), dt = esc(r.auction);
  const td = (r.st === 'TD');
  const EN = td ? `<p>Dear ${esc(owner)},</p>
<p>My name is ${esc(sN)}, a local real estate investor here in Miami. Public records show the property at <b>${addr}</b> is scheduled for a <b>tax deed sale on ${dt}</b> because of unpaid property taxes.</p>
<p>Most people don't realize what that means, or that they still have options before that date:</p>
<ul><li>You can still stop the sale by paying the back taxes (redeeming) any time up until the auction.</li>
<li>If you can't or don't want to keep it, selling to me before the sale puts cash in your pocket instead of losing the property to the county.</li>
<li>If it sells at auction for more than the taxes owed, that surplus may belong to <b>you</b> &mdash; but only if you claim it.</li></ul>
<p>I am not an attorney and this is not legal advice. I buy properties directly, with cash, and can close before the tax-deed deadline &mdash; and if selling isn't your best move, I'll tell you plainly.</p>
<p>If you'd like to talk &mdash; no cost, no obligation, no pressure &mdash; call or text me at <b>${esc(sP)}</b>. Even if the sale is close, there may still be time.</p>
<p>Respectfully,<br>${esc(sN)}<br>${esc(sL)}<br>${esc(sP)}</p>` : `<p>Dear ${esc(owner)},</p>
<p>My name is ${esc(sN)}, a local real estate investor here in Miami. Public court records show the property at <b>${addr}</b> has a foreclosure sale scheduled for <b>${dt}</b>.</p>
<p>You still have options before that date, and most people in this situation are never told what they are:</p>
<ul><li>If the sale brings more than you owe, that surplus belongs to <b>you</b>, not the bank.</li>
<li>The payoff amount on file is often outdated and can be recalculated.</li>
<li>If you have equity, selling before the auction almost always puts more money in your pocket than losing it at auction.</li></ul>
<p>I am not an attorney and this is not legal advice. I buy properties directly, with cash, and close before auction deadlines &mdash; and when buying isn't the right fit, I'll tell you plainly what your better option is, even if it doesn't involve me.</p>
<p>If you'd like to talk &mdash; no cost, no obligation, no pressure &mdash; call or text me at <b>${esc(sP)}</b>. Even if the auction is days away, there may still be time.</p>
<p>Respectfully,<br>${esc(sN)}<br>${esc(sL)}<br>${esc(sP)}</p>`;
  const ES = td ? `<p>Estimado/a ${esc(first)},</p>
<p>Mi nombre es ${esc(sN)}, inversionista de bienes ra&iacute;ces aqu&iacute; en Miami. Los registros p&uacute;blicos muestran que la propiedad en <b>${addr}</b> tiene una <b>subasta de tax deed (deuda de impuestos) programada para el ${dt}</b> por impuestos sin pagar.</p>
<p>La mayor&iacute;a no sabe lo que eso significa, ni que todav&iacute;a tiene opciones antes de esa fecha:</p>
<ul><li>Puede detener la subasta pagando los impuestos atrasados en cualquier momento antes de la subasta.</li>
<li>Si no puede o no quiere conservarla, vend&eacute;rmela antes de la subasta le deja dinero en el bolsillo en lugar de perder la propiedad ante el condado.</li>
<li>Si se vende por m&aacute;s de lo que se debe en impuestos, ese excedente puede pertenecerle a <b>usted</b> &mdash; pero solo si lo reclama.</li></ul>
<p>No soy abogado y esto no es asesor&iacute;a legal. Compro propiedades directamente, en efectivo, y puedo cerrar antes de la fecha l&iacute;mite del tax deed &mdash; y si vender no es lo mejor para usted, se lo digo con franqueza.</p>
<p>Si desea hablar &mdash; sin costo, sin obligaci&oacute;n, sin presi&oacute;n &mdash; ll&aacute;meme o env&iacute;eme un mensaje al <b>${esc(sP)}</b>. Aunque la subasta est&eacute; cerca, todav&iacute;a puede haber tiempo.</p>
<p>Respetuosamente,<br>${esc(sN)}<br>${esc(sL)}<br>${esc(sP)}</p>` : `<p>Estimado/a ${esc(first)},</p>
<p>Mi nombre es ${esc(sN)}, inversionista de bienes ra&iacute;ces aqu&iacute; en Miami. Los registros p&uacute;blicos de la corte muestran que la propiedad en <b>${addr}</b> tiene una subasta de ejecuci&oacute;n hipotecaria programada para el <b>${dt}</b>.</p>
<p>Usted todav&iacute;a tiene opciones antes de esa fecha, y a la mayor&iacute;a nunca se las explican:</p>
<ul><li>Si la subasta vende por m&aacute;s de lo que usted debe, ese excedente le pertenece a <b>usted</b>, no al banco.</li>
<li>El monto del pago que consta en el expediente suele estar desactualizado y se puede recalcular.</li>
<li>Si tiene plusval&iacute;a, vender antes de la subasta casi siempre le deja m&aacute;s dinero que perderla en la subasta.</li></ul>
<p>No soy abogado y esto no es asesor&iacute;a legal. Compro propiedades directamente, en efectivo, y cierro antes de la fecha l&iacute;mite &mdash; y cuando comprar no es lo mejor para usted, se lo digo con franqueza, aunque no me beneficie.</p>
<p>Si desea hablar &mdash; sin costo, sin obligaci&oacute;n, sin presi&oacute;n &mdash; ll&aacute;meme o env&iacute;eme un mensaje al <b>${esc(sP)}</b>. Aunque falten pocos d&iacute;as para la subasta, todav&iacute;a puede haber tiempo.</p>
<p>Respetuosamente,<br>${esc(sN)}<br>${esc(sL)}<br>${esc(sP)}</p>`;
  const doc = `<!doctype html><html><head><meta charset="utf-8"><title>Letter - ${esc(owner)}</title>
<style>
body{font-family:Georgia,serif;max-width:660px;margin:0 auto;padding:40px;color:#111;line-height:1.5}

.bar button.on{background:#2563eb;color:#fff;border-color:#2563eb}

</style></head><body>
<div class="bar"><button id="en" class="on" onclick="show('en')">English</button><button id="es" onclick="show('es')">Espa&ntilde;ol</button><button onclick="window.print()">&#128424; Print / Save PDF</button></div>
<div class="addr">${esc(sN)}<br>${esc(sL)}<br><br>${new Date().toLocaleDateString()}<br><br>${esc(owner)}<br>${mail.replace(/, /g,'<br>')}</div>
<div id="body-en">${EN}</div>
<div id="body-es" style="display:none">${ES}</div>
<script>function show(l){document.getElementById('body-en').style.display=l==='en'?'block':'none';document.getElementById('body-es').style.display=l==='es'?'block':'none';document.getElementById('en').className=l==='en'?'on':'';document.getElementById('es').className=l==='es'?'on':'';}<\/script>

  const w = window.open('', '_blank');
  if(w){ w.document.write(doc); w.document.close(); }
}
const toISO = mdY => { const p = String(mdY||'').split('/'); return p.length===3 ? p[2]+'-'+p[0]+'-'+p[1] : ''; };
function save(){ try { localStorage.setItem(LS, JSON.stringify(notes)); } catch(e) {} }
function view(){
  let rows = DATA.filter(r => tier==='ALL' || r.tier===tier);
  if(q){ const s=q.toLowerCase(); rows = rows.filter(r => (r.owners+' '+r.addr+' '+r.case+' '+r.mail).toLowerCase().includes(s)); }
  if(fy1) rows = rows.filter(r => r.filed && r.filed >= +fy1);
  if(fy2) rows = rows.filter(r => r.filed && r.filed <= +fy2);
  if(ad1) rows = rows.filter(r => toISO(r.auction) >= ad1);
  if(ad2) rows = rows.filter(r => toISO(r.auction) <= ad2);
  if(weekOnly) rows = rows.filter(r => r.days >= 0 && r.days <= 7);
  if(tdOnly) rows = rows.filter(r => r.st === 'TD');
  if(hideDead) rows = rows.filter(r => { const s=(notes[r.case]||{}).status; return s!=='Dead' && s!=='DO NOT CONTACT'; });
  rows = rows.slice();
  rows.sort((a,b) => {
    let x = a[sortK], y = b[sortK];
    if(x==null) x = -Infinity; if(y==null) y = -Infinity;   // no-data leads sink to the bottom
    return (x>y?1:x<y?-1:0)*sortD;
  });
  return rows;
}
function render(){
  const rows = view();
  document.getElementById('stats').textContent = rows.length + ' leads shown / ' + DATA.length + ' total';
  const prof = rows.filter(r => r._profit > 0);
  const totp = prof.reduce((s,r) => s + r._profit, 0);

  if(ds) ds.textContent = prof.length + ' profitable in view · ' + fmt(totp) + ' total est. profit';
  const trs = [], cards = [];
  rows.forEach(r => {
    const n = notes[r.case] || {status:'', note:''};
    const links = [];
    if(r.zillow) links.push('<a href="'+esc(r.zillow)+'" target="_blank" rel="noopener">Zillow</a>');
    if(r.pa) links.push('<a href="'+esc(r.pa)+'" target="_blank" rel="noopener">Appraiser</a>');
    if(r.auc) links.push('<a href="'+esc(r.auc)+'" target="_blank" rel="noopener">Auction</a>');

    links.push('<a href="#" class="lettergen" data-c="'+esc(r.case)+'" title="Generate a print-ready letter (EN/ES) for this owner">&#9993; Letter</a>');
    const summary = [r.owners, r.addr, 'Mailing: '+(r.mail||r.addr), 'Case '+r.case, 'Auction '+r.auction,
      'Value '+fmtK(r.value)+' / Owed '+fmtK(r.judg)+(r.plaintiff?' / vs '+r.plaintiff:'')].join('\n');
    links.push('<a href="#" class="cpy2" data-copy="'+esc(summary)+'" title="Copy owner, address, case & numbers">&#128203; Copy all</a>');
    const ctype = r.ctype ? '<span class="'+(r.st==='TD'?'tdt':(r.ctype.indexOf('HOA')>-1?'hoa':'mtg'))+'">'+esc(r.ctype)+'</span>' : '';
    const pcls = r._profit >= 0 ? 'profpos' : 'profneg';
    // Profit cell: big profit, then ROI + cash sub-line, then flags. "no value data" when un-enriched.
    const prof = r._nodata
      ? '<span class="meta" title="No market value from the appraiser (parcel not listed or login-gated). Can\'t estimate profit.">no value data</span>'
      : '<span class="'+pcls+'">'+fmt0(r._profit)+'</span>'+
        (r._cash>0?'<div class="submeta">'+Math.round(r._roi)+'% ROI · '+fmtK(r._cash)+' in</div>':'')+
        (r.ju?'<div class="warn" title="Final judgment not posted yet - the debt is unknown, so this profit assumes $0 owed. Verify on the docket.">debt not posted</div>':'')+
        (r._tight?'<div class="warn" title="The debt owed is more than your discounted offer, so there is little or no margin. Negotiate below the debt or pass.">thin: debt &gt; offer</div>':'')+
        (r.mr?'<div class="mrwarn" title="HOA judgment likely hides a senior mortgage - verify true payoff on the docket">&#9888; mortgage risk</div>':'');
    // Auction cell: date, countdown, filed/bought sub-lines
    const auc = '<div>'+esc(r.auction)+'</div>'+
      '<div class="submeta '+(r.days<7?'urgent':'')+'">'+(r.days>=0?'in '+r.days+'d':'passed')+'</div>'+
      (r.filed||r.bought?'<div class="meta">'+(r.filed?'filed '+r.filed:'')+(r.bought?' · bought '+r.bought:'')+'</div>':'');
    // Owner cell: owner names, plaintiff (clamped), count of other defendants
    const dlist = r.defs ? r.defs.split(';').map(x=>x.trim()).filter(Boolean) : [];
    const defsHtml = dlist.length
      ? '<div class="defwrap"><button class="deftog" type="button">+ '+dlist.length+' also named</button>'+
        '<div class="deflist">'+dlist.map(d=>'<div>'+esc(d)+'</div>').join('')+'</div></div>'
      : '';
    const owner = '<div class="clamp2" title="'+esc(r.owners)+'">'+esc(r.owners)+'</div>'+
      (r.plaintiff?'<div class="meta clamp2" title="'+esc(r.plaintiff)+'">vs '+esc(r.plaintiff)+'</div>':'')+
      defsHtml;
    // Property cell: address (with copy), compact numbers line, any warning
    const prop = '<div class="addrline"><span class="clamp2" title="'+esc(r.addr)+'">'+esc(r.addr)+'</span>'+copyBtn(r.addr,'property address')+'</div>'+
      '<div class="submeta">'+fmtK(r.value)+' val · '+(r.st==='TD'?fmtK(r.obid)+' opening bid':fmtK(r.judg)+' owed')+(r.eq?' · '+r.eq+'% '+(r.st==='TD'?'spread':'eq'):'')+(r.hs?' · <span class="hs">HS</span>':'')+'</div>'+
      (r.warn && !r.mr?'<div class="warn">'+esc(r.warn)+'</div>':'');
    const opts = ['','Letter sent','Skip-traced','Called - no answer','Called - talked','Appointment','Dead','DO NOT CONTACT'];
    const statusSel = '<select class="status" data-c="'+esc(r.case)+'">'+
      opts.map(s => '<option'+(n.status===s?' selected':'')+'>'+s+'</option>').join('')+'</select>';
    const notesTa = '<textarea class="notes" data-c="'+esc(r.case)+'" placeholder="notes">'+esc(n.note)+'</textarea>';
    trs.push('<tr>'+
      '<td class="'+esc(r.tier)+'">'+esc(r.tier)+'</td>'+
      '<td class="num">'+prof+'</td>'+
      '<td class="num">'+r.score+'</td>'+
      '<td>'+auc+'</td>'+
      '<td>'+ctype+'</td>'+
      '<td>'+owner+'</td>'+
      '<td>'+prop+'</td>'+
      '<td><div class="addrline"><span class="clamp2" title="'+esc(r.mail)+'">'+esc(r.mail)+'</span>'+(r.mail?copyBtn(r.mail,'mailing address'):'')+'</div></td>'+
      '<td class="links">'+links.join(' ')+'</td>'+
      '<td>'+statusSel+'</td>'+
      '<td>'+notesTa+'</td></tr>');
    // mobile card
    cards.push('<div class="card">'+
      '<div class="chead"><span class="'+esc(r.tier)+' cbadge">'+esc(r.tier)+'</span>'+
        (r._nodata?'<span class="meta cprofit" style="font-size:14px">no value data</span>'
                  :'<span class="'+pcls+' cprofit">'+fmt0(r._profit)+'</span>')+
        '<span class="cscore">Score '+r.score+'</span></div>'+
      (!r._nodata&&r._cash>0?'<div class="submeta">'+Math.round(r._roi)+'% ROI · '+fmtK(r._cash)+' cash to acquire</div>':'')+
      (r.ju&&!r._nodata?'<div class="warn">debt not posted - assumes $0 owed</div>':'')+
      (r.mr?'<div class="mrwarn">&#9888; mortgage risk - verify payoff</div>':'')+
      '<div class="cowner">'+esc(r.owners)+'</div>'+
      (r.plaintiff?'<div class="meta">vs '+esc(r.plaintiff)+'</div>':'')+
      defsHtml+
      '<div class="caddr addrline"><span>'+esc(r.addr)+'</span>'+copyBtn(r.addr,'property address')+'</div>'+
      '<div class="submeta">'+fmtK(r.value)+' val · '+(r.st==='TD'?fmtK(r.obid)+' opening bid':fmtK(r.judg)+' owed')+(r.eq?' · '+r.eq+'% '+(r.st==='TD'?'spread':'eq'):'')+(r.hs?' · <span class="hs">HS</span>':'')+'</div>'+
      '<div class="submeta">'+esc(r.auction)+' · <span class="'+(r.days<7?'urgent':'')+'">'+(r.days>=0?'in '+r.days+'d':'passed')+'</span> · '+ctype+'</div>'+
      (r.mail?'<div class="meta addrline">&#9993; <span>'+esc(r.mail)+'</span>'+copyBtn(r.mail,'mailing address')+'</div>':'')+
      '<div class="clinks">'+links.join(' ')+'</div>'+
      '<div class="cctl">'+statusSel+notesTa+'</div>'+
      '</div>');
  });
  document.getElementById('tb').innerHTML = trs.join('');
  const cc = document.getElementById('cards');
  if(cc) cc.innerHTML = cards.join('');
}

  const flash = () => {
    const orig = btn.innerHTML; btn.classList.add('ok');
    btn.innerHTML = btn.classList.contains('cpy2') ? '&#10003; Copied' : '&#10003;';
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('ok'); }, 1100);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(flash, () => fallbackCopy(text, flash));
  } else fallbackCopy(text, flash);
});
function fallbackCopy(text, done){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); done && done(); } catch(e) {}
  document.body.removeChild(ta);
}
