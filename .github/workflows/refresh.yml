name: DEALFLOW Daily Refresh

# Runs the same pipeline refresh-dealflow.bat does on Alejandro's Windows machine, but on
# GitHub-hosted Ubuntu. Fires daily at 13:00 UTC (09:00 EDT / 08:00 EST — DST-drifts by 1h
# in winter, still hits morning) and can be manually kicked from the Actions tab.
#
# This is the durable replacement for the "DEALFLOW Refresh" Windows Task Scheduler entry that
# timed out and killed the pipeline on 2026-07-18. Every step's failure surfaces via GitHub's
# built-in workflow-failure email — no more silent rot on the live site.
#
# Sequencing matches the bat exactly, including the "publish fresh leads NOW, then enrich, then
# publish again" two-phase pattern that guarantees SOMETHING lands on docs/index.html even if a
# later slow step (skiptrace, photos) hangs.

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  # Only one refresh at a time — never let a manual run collide with the daily cron and
  # step on itself with two concurrent pushes.
  group: dealflow-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # Every scraper checks env FIRST, then falls back to a gitignored *.key file. On GHA
      # only env is available; on Alejandro's local machine only files are.
      GOOGLE_STREET_VIEW_KEY: ${{ secrets.GOOGLE_STREET_VIEW_KEY }}
      TRACERFY_API_KEY: ${{ secrets.TRACERFY_API_KEY }}
      BATCHDATA_API_KEY: ${{ secrets.BATCHDATA_API_KEY }}
      # accept whatever you named the 2Captcha secret — no need to match one exact name
      CAPTCHA_KEY: ${{ secrets.CAPTCHA_KEY || secrets.TWOCAPTCHA_KEY || secrets.CAPTCHA || secrets.TWO_CAPTCHA_KEY || secrets.TWOCAPTCHA }}
      TWOCAPTCHA_KEY: ${{ secrets.CAPTCHA_KEY || secrets.TWOCAPTCHA_KEY || secrets.CAPTCHA || secrets.TWO_CAPTCHA_KEY || secrets.TWOCAPTCHA }}
      # Skip the "Desktop tracker + daily CSV" write entirely on the runner (DEALFLOW_NO_DESKTOP
      # guard in foreclosure_leads.py — the OneDrive path only exists on Alejandro's machine).
      DEALFLOW_NO_DESKTOP: '1'
      # Same 8-min link-generator budget the local pipeline uses.
      GEN_DEADLINE: '480'
      # Keep pip/apt quiet.
      PIP_DISABLE_PIP_VERSION_CHECK: '1'

    steps:
      - name: Checkout (with push token)
        uses: actions/checkout@v4
        with:
          # Needed so the later `git push` uses a token with contents:write on THIS repo.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # State persistence — CRITICAL. Runners start from a bare checkout, but the pipeline's
      # per-day state files are gitignored by design. Without this cache:
      #  - skiptrace_results.json empty -> skiptrace.py would RE-PAY to re-trace ~640 leads
      #    every single run (~$60-95/day of pure waste)
      #  - broward/palmbeach_leads.json missing -> a bot-walled county day publishes the site
      #    WITHOUT that county instead of keeping last-good data
      #  - records_liens --cached-only has no cache -> Miami-Dade lien chains silently vanish
      #  - broward/palmbeach_liens.json missing -> every run re-traces the WHOLE county book
      #    (and the rebuilt site ships with zero Broward/PB chains until it finishes)
      # Saved on green runs; a failed day just restores the previous day's state.
      - name: Restore pipeline state (leads, phones, liens, link tokens)
        uses: actions/cache@v4
        with:
          path: |
            leads_final.json
            leads_raw.json
            broward_leads.json
            palmbeach_leads.json
            skiptrace_results.json
            cases_qs.json
            records_qs.json
            records_liens.json
            broward_liens.json
            palmbeach_liens.json
            batchdata_liens.json
            county_plaintiffs.json
            lis_pendens.json
            lp_leads.json
            tax_links.json
            comps.json
            property_types_cache.json
            listing_status_cache.json
            health.json
            full.json
          key: dealflow-state-${{ github.run_id }}
          restore-keys: dealflow-state-
      # sale_history_cache.json is deliberately NOT in the actions/cache list above: it is COMMITTED
      # to the repo (local Claude/Kimi runs keep it current), and the restore step was SHADOWING the
      # fresh committed copy with a stale runner copy — which could ship the site with partial
      # stay-compliance coverage. One source of truth: the checked-out file.

      # Access codes — CRITICAL. make_tracker encrypts docs/index.html with the per-person codes
      # from site.codes (gitignored, never committed). If this file is absent on the runner,
      # _load_codes() returns [] and the build goes out PUBLIC + PHONE-FREE + GATELESS — silently
      # downgrading the live site for all 6 code holders. Abort instead.
      - name: Access codes for the encrypted build (site.codes from secret)
        run: |
          printf '%s\n' "${{ secrets.SITE_CODES }}" > site.codes
          test -s site.codes || { echo "::error::SITE_CODES secret is missing — refusing to publish an UNENCRYPTED build. Add it in repo Settings -> Secrets."; exit 1; }

      # Scrapers read a gitignored *.key file first (or the env var). Materialize the key files from the
      # repo secrets so the CLOUD run has the SAME capability as the local machine: 2Captcha (Turnstile +
      # Broward reCAPTCHA), BatchData (phones + Palm Beach liens), Tracerfy (cheaper phones).
      - name: API keys for the scrapers (secrets -> gitignored *.key)
        run: |
          [ -n "$BATCHDATA_API_KEY" ] && printf '%s' "$BATCHDATA_API_KEY" > batchdata.key || true
          [ -n "$TRACERFY_API_KEY"  ] && printf '%s' "$TRACERFY_API_KEY"  > tracerfy.key  || true
          [ -n "$CAPTCHA_KEY"       ] && printf '%s' "$CAPTCHA_KEY"       > captcha.key   || true
          echo "keys -> batchdata=$([ -s batchdata.key ] && echo Y || echo N) tracerfy=$([ -s tracerfy.key ] && echo Y || echo N) captcha=$([ -s captcha.key ] && echo Y || echo N)"

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ---- [1/5] Miami-Dade scrape + enrich + first tracker rebuild -------------------------
      - name: '[1/5] Pull new auction leads (MD scrape + enrich)'
        run: python foreclosure_leads.py

      # ---- [1b/5] Publish fresh leads immediately (mirrors the bat) ------------------------
      # Rationale: if a later enrichment step (skiptrace, photos, county merge) hangs, at
      # least the newest MD leads already landed on docs/index.html. Same reasoning the local
      # bat uses.
      - name: '[1b/5] Publish fresh leads NOW'
        run: |
          # COMPLIANCE FIRST: the fresh scrape has no sale-history fields yet, so the build [1/5]
          # just produced would ship every stay-active lead (67 on 2026-07-21) with LIVE outreach
          # buttons — §362 landmines — until the final publish ~40 min later. Apply the committed
          # cache fetch-free and rebuild, THEN publish: yesterday's stay flags beat a naked board.
          python sale_history.py --cache-only
          python -c "import json, foreclosure_leads as F; F.make_tracker(json.load(open('leads_final.json',encoding='utf-8')))"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "no change — nothing to publish yet"
          else
            git commit -m "refresh: fresh leads (auto)"
            # Three writers hit main (Claude, Kimi, this pipeline) — a bare push loses the race the
            # moment anyone lands a commit mid-run (2026-07-21: run died here, all enrichment
            # skipped). Rebase-with-retry; on a docs/index.html conflict the freshly built file
            # wins (-X theirs during rebase = OUR replayed commit — generated artifact, newest is truth).
            for i in 1 2 3; do
              git pull --rebase --autostash -X theirs origin main && git push origin HEAD:main && break
              [ "$i" = 3 ] && exit 1
              sleep 10
            done
          fi

      # ---- [1c/5] Broward + Palm Beach scrape ---------------------------------------------
      # Per-county try/except: a thin/blocked county keeps its last-good *_leads.json
      # (make_tracker glob-merges every *_leads.json at rebuild time, so a broken county just
      # falls back to yesterday's data instead of blanking the site).
      - name: '[1c/5] Broward + Palm Beach scrape'
        continue-on-error: true
        run: |
          set +e
          python county_leads.py --county broward
          bw=$?
          python county_leads.py --county "palm beach"
          pb=$?
          echo "broward exit=$bw · palm beach exit=$pb"
          # Never fail the whole workflow on one blocked county.
          exit 0

      # ---- [2/5] Link generators (bounded by GEN_DEADLINE) --------------------------------
      - name: '[2/5] Generate court-case + records-search links'
        continue-on-error: true
        run: |
          python gen_cases_qs.py --limit 40
          python gen_records_qs.py --limit 40

      # ---- [2c/5] Deep per-parcel tax links (Broward; Algolia-minted account URLs) --------
      - name: '[2c/5] Deep tax links (Broward parcels)'
        continue-on-error: true
        run: python gen_tax_links.py --limit 60

      # ---- [2d/5] Radius comps -> ARV (ALL 3 counties) ------------------------------------
      # comps.py enriches every county: Broward + Palm Beach off the FL statewide cadastral, and
      # Miami-Dade off the county's OWN MD_ComparableSales layer (gisweb.miamidade.gov). New-only
      # + cached in comps.json, so future scrapes keep every new lead in ARV coverage automatically.
      # Do NOT scope this back to BW+PB — MD leads would silently lose their ARV. The healthcheck
      # RULE: ARV-comp coverage assertion goes RED (emails the owner) if this ever regresses.
      - name: '[2d/5] Radius comps -> ARV (Miami-Dade + Broward + Palm Beach)'
        continue-on-error: true
        run: python comps.py --limit 120

      # ---- [2b/5] Recorded mortgage chains -------------------------------------------------
      - name: '[2b/5] Recorded mortgage chains + senior-survives classification'
        continue-on-error: true
        run: |
          # With the 2Captcha key present, MD mints NEW Turnstile chains (not just cached); caps bound spend.
          if [ -s captcha.key ]; then python records_liens.py --all --limit 60; else python records_liens.py --all --cached-only; fi
          if [ -f broward_leads.json ]; then python broward_liens.py --all; fi
          if [ -s batchdata.key ]; then python batchdata_liens.py --all --limit 80; fi
          # Broward plaintiff -> bank-1st(clean) vs junior/HOA(senior survives). PB is headed-browser (--pb) = local only.
          if [ -s captcha.key ] && [ -f broward_leads.json ]; then python county_plaintiffs.py --county broward --near --limit 60; fi

      # ---- [2c/5] Fresh LIS PENDENS front-of-funnel -------------------------------------------
      # The docket-wide blank-name sweep is walled, but NAME searches aren't: sweep the ~34 lenders who
      # file most foreclosures over a rolling ISO window, keep the LIS PENDENS, dedupe -> the owner the
      # DAY their case is filed. lp_leads.py shapes them into st='LP' board leads (Fresh-filings lane).
      - name: '[2c/5] Fresh Lis Pendens (lender-sweep -> lp_leads.json)'
        continue-on-error: true
        run: |
          if [ -s captcha.key ]; then python lis_pendens.py --days 30; fi
          if [ -f lis_pendens.json ]; then python lp_leads.py; fi

      # ---- [3/5] Skip-trace phones (only if a key is present) -----------------------------
      - name: '[3/5] Humans behind LLCs (Sunbiz) + skip-trace phones (all tiers, capped)'
        if: env.TRACERFY_API_KEY != '' || env.BATCHDATA_API_KEY != ''
        continue-on-error: true
        run: |
          python llc_officers.py --limit 60
          python skiptrace.py --all --limit 120

      # ---- [3b/5] Property photos (Zillow + Street View + aerials) ------------------------
      - name: '[3b/5] Property photos'
        continue-on-error: true
        run: python property_photos.py --zillow

      # ---- [3c/5] Property types (BCPA + PBCPAO -> dor_desc for BW/PB) --------------------
      # Miami-Dade already gets dor_desc from apps.miamidadepa.gov via county_leads.py. BW/PB
      # need a separate fetch — the county scrapes don't include use codes. Cached per folio in
      # property_types_cache.json (via the actions/cache step above) so we only pay for BRAND-NEW
      # leads each day. Fail-soft: any parse/HTTP error leaves dor_desc blank on that lead and
      # the tracker renders no ptype chip; never blocks the workflow.
      - name: '[3c/5] Property types (Broward + Palm Beach)'
        continue-on-error: true
        run: python property_types.py

      # ---- [3d/5] Zillow listing status (LISTED / PENDING / SOLD / RENTAL / OFF-MARKET) ----
      # 7-day TTL cache (listing_status_cache.json) so only ~1/7th of leads re-check daily.
      # --limit 120 caps a cold-cache day at ~5 min so this step can never eat the job window.
      - name: '[3d/5] Zillow listing status'
        continue-on-error: true
        run: python listing_status.py --limit 120

      # ---- [3e/5] Sale-history survival count (the REAL staller signal, Miami-Dade docket) --------
      # Counts how many scheduled foreclosure sales each owner has already dodged (cancelled/reset),
      # straight from the MD Clerk OCS docket — free, same endpoint the clerk-enrich already hits.
      # 7-day TTL (the count changes when a new sale is set/cancelled). Feeds the FRESH/STALLER chip
      # and keeps serial stallers OUT of the Closers list. Broward/PB fall back to the filing-year proxy.
      - name: '[3e/5] Sale-history survival count (Miami-Dade)'
        continue-on-error: true
        run: python sale_history.py --limit 150

      # ---- [3f/5] Humans behind LLC-owned leads (Sunbiz officers/RA) -----------------------
      # llc_officers.json is COMMITTED (same single-source rule as the stay cache); only new
      # cases hit Sunbiz. Fail-soft: a blocked day keeps yesterday's humans.
      - name: '[3f/5] LLC officers (Sunbiz)'
        continue-on-error: true
        run: python llc_officers.py --limit 40

      # ---- [4/5] Final rebuild with everything baked in -----------------------------------
      - name: '[4/5] Rebuild site (cases + phones + photos + liens)'
        run: |
          python -c "import json, foreclosure_leads as F; F.make_tracker(json.load(open('leads_final.json',encoding='utf-8')))"

      # ---- [5/5] Publish final ------------------------------------------------------------
      - name: '[5/5] Publish final docs/index.html'
        run: |
          # docs/img/ also picks up new photos this run — stage them too. sale_history_cache.json
          # is committed as well: it is the SINGLE SOURCE for stay-compliance (no actions/cache
          # copy anymore), so the daily [3e] refresh must flow back into the repo.
          git add docs/index.html docs/img sale_history_cache.json llc_officers.json
          if git diff --staged --quiet; then
            echo "nothing changed — site already current"
          else
            git commit -m "refresh: auto lead + phone + photo update"
            # same race-proofing as [1b/5]: rebase-with-retry, fresh build wins conflicts
            for i in 1 2 3; do
              git pull --rebase --autostash -X theirs origin main && git push origin HEAD:main && break
              [ "$i" = 3 ] && exit 1
              sleep 10
            done
          fi

      # ---- Health ------------------------------------------------------------------------
      # healthcheck.py exits non-zero on any FAIL — that fails this step, which fails the
      # workflow, which fires GitHub's built-in workflow-failure email to the repo owner.
      # No Twilio / SMS wiring needed; the notification path is already there for free.
      - name: 'Health'
        run: python healthcheck.py

      # Always-on run summary (visible in the Actions UI without opening logs)
      - name: Run summary
        if: always()
        run: |
          echo "### DEALFLOW refresh summary" >> $GITHUB_STEP_SUMMARY
          python -c "import json,os; load=lambda fn: (json.load(open(fn,encoding='utf-8')) if os.path.exists(fn) else []); md=load('leads_final.json'); bw=load('broward_leads.json'); pb=load('palmbeach_leads.json'); st=load('skiptrace_results.json'); st=st if isinstance(st,dict) else {}; ph=sum(1 for v in st.values() if isinstance(v,dict) and v.get('phones')); kb=os.path.getsize('docs/index.html')//1024 if os.path.exists('docs/index.html') else 0; print(f'- Miami-Dade **{len(md)}** - Broward **{len(bw)}** - Palm Beach **{len(pb)}**'); print(f'- Owners with phones **{ph}**'); print(f'- docs/index.html **{kb} KB**')" >> $GITHUB_STEP_SUMMARY
          echo "- Red run = email alert (Actions notifications). Green runs need no attention." >> $GITHUB_STEP_SUMMARY
